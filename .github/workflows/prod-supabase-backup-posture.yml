name: Prod Supabase Backup Posture

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: hushh-pda
  BACKUP_BUCKET: hushh-pda-prod-db-backups
  BACKUP_PREFIX: prod/supabase-logical
  BACKUP_MAX_AGE_HOURS: "30"

jobs:
  backup-posture:
    name: Daily Logical Backup Posture Check
    if: github.repository == 'hushh-labs/hushh-research'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backup posture dependencies
        run: python3 -m pip install --disable-pip-version-check google-cloud-storage

      - name: Run logical backup posture policy check
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/logical_backup_freshness_check.py \
            --project-id "${GCP_PROJECT_ID}" \
            --bucket "${BACKUP_BUCKET}" \
            --prefix "${BACKUP_PREFIX}" \
            --max-age-hours "${BACKUP_MAX_AGE_HOURS}" \
            --report-path /tmp/prod-backup-posture-report.json

      - name: Upload backup posture artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: prod-backup-posture-${{ github.run_id }}
          if-no-files-found: ignore
          path: /tmp/prod-backup-posture-report.json
