#
# SwiftLint config for apps/one-mac/.
# Strict by intent: force-unwrap is an error, line length is enforced, every public
# Swift symbol must have a leading triple-slash doc string.

included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData
  - OneMac.xcodeproj
  - Tests/Fixtures

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - sorted_imports
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo
  - line_length

force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

file_header:
  required_pattern: |
                    \/\/ SPDX-FileCopyrightText: \d{4} Hushh
                    \/\/ SPDX-License-Identifier: Apache-2\.0

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - hct
    - dat
    - crt
    - ttl
    - x
    - y

type_name:
  min_length:
    warning: 2

function_parameter_count:
  warning: 8
  error: 12

cyclomatic_complexity:
  warning: 12
  error: 20

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1200

nesting:
  type_level:
    warning: 3

reporter: "github-actions-logging"
