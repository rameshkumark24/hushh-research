#
# XcodeGen spec — generates apps/one-mac/OneMac.xcodeproj from this file.
# The .xcodeproj is gitignored; CI regenerates on every run.
# Run locally: `brew install xcodegen && cd apps/one-mac && xcodegen generate`.

name: OneMac
options:
  bundleIdPrefix: ai.hushh.one
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: ""                  # CI injects via xcconfig overlay
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""                # CI: "Developer ID Application" or "Apple Development"
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  OneMacPackage:
    path: .

targets:
  OneMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/OneMac
    resources:
      - path: Resources/OneMac/Localizable.xcstrings
        optional: true
      - path: Resources/OneMac/Assets.xcassets
        optional: true
    info:
      path: Resources/OneMac/Info.plist
    entitlements:
      path: Resources/OneMac/OneMac.entitlements
    dependencies:
      - package: OneMacPackage
        product: OneShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hushh.one
        PRODUCT_NAME: One
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO

  OneMacMAS:
    type: application
    platform: macOS
    sources:
      - path: Sources/OneMac
    resources:
      - path: Resources/OneMac/Localizable.xcstrings
        optional: true
    info:
      path: Resources/OneMac/Info.plist
    entitlements:
      path: Resources/OneMac/OneMac.MAS.entitlements
    dependencies:
      - package: OneMacPackage
        product: OneShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hushh.one.mas
        PRODUCT_NAME: One
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS"

  OneDaemon:
    type: tool
    platform: macOS
    sources:
      - path: Sources/OneDaemon
    info:
      path: Resources/OneDaemon/Info.plist
    entitlements:
      path: Resources/OneDaemon/OneDaemon.entitlements
    dependencies:
      - package: OneMacPackage
        product: OneShared
      - package: OneMacPackage
        product: OneIndexer
      - package: OneMacPackage
        product: OneMCPServer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hushh.one.daemon
        PRODUCT_NAME: ai.hushh.one.daemon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  OneMac:
    build:
      targets:
        OneMac: all
    archive:
      config: Release
    run:
      config: Debug
    test:
      config: Debug

  OneMacMAS:
    build:
      targets:
        OneMacMAS: all
    archive:
      config: Release

  OneDaemon:
    build:
      targets:
        OneDaemon: all
    archive:
      config: Release
    run:
      config: Debug
