# Cloud Build configuration for Next.js frontend
# Deploy to: Cloud Run (service name configurable via substitutions)

steps:
  # Step 1: Build Docker image with runtime-specific environment variables (using Secrets)
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        required_vars=(
          NEXT_PUBLIC_FIREBASE_API_KEY_VAL
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL
          NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL
          NEXT_PUBLIC_FIREBASE_APP_ID_VAL
          NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL
          NEXT_PUBLIC_APP_URL_VAL
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID_VAL
          NEXT_PUBLIC_GTM_ID_VAL
          BACKEND_URL_VAL
        )
        for name in "${required_vars[@]}"; do
          if [ -z "${!name}" ]; then
            echo "Missing required frontend build config: ${name}"
            exit 1
          fi
        done
        docker build \
          -t gcr.io/$PROJECT_ID/hushh-webapp:manual \
          -t gcr.io/$PROJECT_ID/hushh-webapp:latest \
          -t gcr.io/$PROJECT_ID/hushh-webapp:${_IMAGE_TAG} \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$$NEXT_PUBLIC_FIREBASE_APP_ID_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_VAPID_KEY=$$NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID_VAL \
          --build-arg NEXT_PUBLIC_BACKEND_URL=$$BACKEND_URL_VAL \
          --build-arg NEXT_PUBLIC_DEVELOPER_API_URL=$$BACKEND_URL_VAL \
          --build-arg NEXT_PUBLIC_APP_URL=$$NEXT_PUBLIC_APP_URL_VAL \
          --build-arg NEXT_PUBLIC_APP_ENV=${_APP_ENV} \
          --build-arg NEXT_PUBLIC_OBSERVABILITY_ENABLED=true \
          --build-arg NEXT_PUBLIC_OBSERVABILITY_DEBUG=false \
          --build-arg NEXT_PUBLIC_OBSERVABILITY_SAMPLE_RATE=1 \
          --build-arg NEXT_PUBLIC_GTM_ID=$$NEXT_PUBLIC_GTM_ID_VAL \
          -f hushh-webapp/Dockerfile \
          hushh-webapp
    secretEnv: [
      "BACKEND_URL_VAL",
      "NEXT_PUBLIC_APP_URL_VAL",
      "NEXT_PUBLIC_FIREBASE_API_KEY_VAL",
      "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL",
      "NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL",
      "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL",
      "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL",
      "NEXT_PUBLIC_FIREBASE_APP_ID_VAL",
      "NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL",
      "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID_VAL",
      "NEXT_PUBLIC_GTM_ID_VAL"
    ]
    id: "build-frontend-image"

  # Step 2: Push Docker image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hushh-webapp:manual"
    id: "push-frontend-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hushh-webapp:latest"
    id: "push-frontend-latest"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/hushh-webapp:${_IMAGE_TAG}"
    id: "push-frontend-version"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        cmd=(
          gcloud run deploy "${_FRONTEND_SERVICE}"
          "--image=gcr.io/$PROJECT_ID/hushh-webapp:${_IMAGE_TAG}"
          "--region=${_REGION}"
          "--platform=managed"
          "--allow-unauthenticated"
          "--port=8080"
          "--memory=512Mi"
          "--cpu=1"
          "--timeout=120"
          "--max-instances=10"
          "--min-instances=1"
          "--labels=managed-by=hushh-github-actions,deploy-env=${_DEPLOY_ENV},deploy-source=${_DEPLOY_SOURCE},deploy-sha=${_DEPLOY_SHA},github-run-id=${_GITHUB_RUN_ID}"
          "--set-env-vars=NEXT_PUBLIC_APP_ENV=${_APP_ENV},HUSHH_DEPLOY_ENV=${_DEPLOY_ENV},HUSHH_DEPLOY_SOURCE=${_DEPLOY_SOURCE},HUSHH_DEPLOY_SHA=${_DEPLOY_SHA},HUSHH_DEPLOY_RUN_ID=${_GITHUB_RUN_ID},RIA_ONBOARDING_PROXY_TIMEOUT_MS=90000"
          "--set-secrets=BACKEND_URL=BACKEND_URL:latest,DEVELOPER_API_URL=BACKEND_URL:latest,FIREBASE_ADMIN_CREDENTIALS_JSON=FIREBASE_ADMIN_CREDENTIALS_JSON:latest"
        )

        if [[ "${_CLOUD_RUN_NO_TRAFFIC}" == "true" ]]; then
          cmd+=("--no-traffic")
        fi

        "${cmd[@]}"
    id: "deploy-frontend"

# Images to store in Container Registry
images:
  - "gcr.io/$PROJECT_ID/hushh-webapp:manual"
  - "gcr.io/$PROJECT_ID/hushh-webapp:latest"
  - "gcr.io/$PROJECT_ID/hushh-webapp:${_IMAGE_TAG}"

# Build timeout
timeout: "1200s"

substitutions:
  _FRONTEND_SERVICE: hushh-webapp
  _REGION: us-central1
  _APP_ENV: production
  _CLOUD_RUN_NO_TRAFFIC: "false"
  _IMAGE_TAG: v2.1.2
  _DEPLOY_ENV: manual
  _DEPLOY_SOURCE: manual
  _DEPLOY_SHA: unknown
  _GITHUB_RUN_ID: unknown

# Secrets to fetch
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/BACKEND_URL/versions/latest
      env: "BACKEND_URL_VAL"
    - versionName: projects/$PROJECT_ID/secrets/APP_FRONTEND_ORIGIN/versions/latest
      env: "NEXT_PUBLIC_APP_URL_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_API_KEY_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_PROJECT_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_APP_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_APP_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_VAPID_KEY/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_VAPID_KEY_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID/versions/latest
      env: "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID_VAL"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_GTM_ID/versions/latest
      env: "NEXT_PUBLIC_GTM_ID_VAL"

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
